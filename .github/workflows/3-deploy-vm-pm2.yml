# 1) Pipeline goal: lint -> build -> smoke-test -> deploy -> cleanup to Azure VM via SSH + PM2.

name: Azure VM PM2 Pipeline

# on:
#   workflow_dispatch:

on:
    workflow_dispatch:
    push:
        branches:
            - main

jobs:
  # 2) Lint job: fail fast on repo issues.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint

  # 3) Build job: install, build, and upload artifact for later jobs.
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: vm-package
          path: .

  # 4) Smoke-test job: start app locally and verify a simple endpoint.
  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vm-package
      - run: npm ci
      - run: PORT=5050 node server.js & sleep 2
      - run: curl -fsS http://127.0.0.1:5050/app-config.js

# 5) Deploy job: SSH into VM, update code, build, and run app on PORT=8080 via PM2.
 
  deploy-ssh:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.SSH_DEPLOY_ENABLED == 'true' }}  # optional, toggle SSH deployment
    steps:
      - name: Download artefact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          port: ${{ secrets.REMOTE_PORT || 22 }}
          script: |
            cd /path/to/app
            unzip -o deploy.zip
            npm install --production
            pm2 restart server.js || pm2 start server.js
